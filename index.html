<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Server | Welcome</title>
    <style>
        :root {
            --deep-blue: #0077be;
            --light-blue: #00aaff;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #004d7a;
        }

        /* Animated Background Wave Effect */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #00b4db 0%, #0083b0 100%);
            z-index: -1;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('https://cdn.pixabay.com/photo/2017/02/07/11/47/wave-2045633_1280.png');
            background-size: 1000px 100px;
            opacity: 0.4;
            animation: wave-animation 10s linear infinite;
        }

        .wave:nth-child(2) {
            bottom: 10px;
            opacity: 0.5;
            animation: wave-animation 15s linear infinite reverse;
        }

        @keyframes wave-animation {
            0% { background-position-x: 0; }
            100% { background-position-x: 1000px; }
        }

        /* Content Card */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            color: var(--white);
            max-width: 500px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .status-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: #00d2ff;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="card">
        <h1>Fluid
